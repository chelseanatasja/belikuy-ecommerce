</div>
<!-- Password Input -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input class="w-full pl-[48px] pr-md py-3 bg-surface-bright border-none rounded-lg font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary-container focus:bg-surface-container-lowest shadow-[0_4px_15px_rgba(255,182,193,0.05)] transition-all outline-none placeholder:text-outline-variant" placeholder="Kata Sandi" type="password"/>
<div class="absolute inset-y-0 right-0 pr-md flex items-center cursor-pointer">
<span class="material-symbols-outlined text-outline hover:text-primary transition-colors">visibility_off</span>
</div>
</div>
